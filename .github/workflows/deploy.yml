name: Build Web & Deploy to Capgo

on:
  push:
    branches: ["main", "master"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          check-latest: true

      # ⚠️ ДОБАВЛЕНО: Установка Java (нужна для сборки Android)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Verify Node.js version
        run: |
          node --version
          npm --version

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true

      - name: Sync Capacitor
        run: |
          npx cap --version
          npx cap sync android   # ⚠️ ИЗМЕНЕНО: явно указываем android

      # ⚠️ ДОБАВЛЕНО: Сборка APK
      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # ⚠️ ДОБАВЛЕНО: Загрузка APK в Artifacts (ЭТО ТО, ЧЕГО У ВАС НЕ БЫЛО)
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload to Capgo
        run: npx @capgo/cli bundle upload --channel production
        env:
          CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
