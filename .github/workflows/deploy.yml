name: Build Web & Deploy to Capgo

on:
  push:
    branches: ["main"] # Срабатывает при пуше в main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build # Создает папку dist/

      # --- ЧАСТЬ 1: GitHub Pages (Веб) ---
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

      # --- ЧАСТЬ 2: Capacitor Sync + Capgo (Мобильное OTA) ---
      - name: Sync Capacitor
        run: npx cap sync

      - name: Upload to Capgo
        run: npx @capgo/cli bundle upload --channel production
        env:
          CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
